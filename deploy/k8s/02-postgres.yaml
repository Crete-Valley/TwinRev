apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: digital-twin
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: digital-twin
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        # uid/gid 999 = postgres user of the official image.
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: cvdt/db:local
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: {name: dt-secrets, key: DB_POST_NAME}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: {name: dt-secrets, key: DB_POST_USER}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: dt-secrets, key: DB_POST_PASSWORD}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-h", "127.0.0.1"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-h", "127.0.0.1"]
            initialDelaySeconds: 120
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: digital-twin
spec:
  # ClusterIP only: the database is never exposed outside the cluster.
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
