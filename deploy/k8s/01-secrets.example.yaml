# EXAMPLE ONLY — copy to a file outside git (or use scripts/create-secrets.sh)
# and fill in real values. NEVER commit real credentials, endpoints or tokens.
#
#   kubectl apply -f my-secrets.yaml     # your filled-in copy, kept out of git
#
apiVersion: v1
kind: Secret
metadata:
  name: dt-secrets
  namespace: digital-twin
type: Opaque
stringData:
  # PostgreSQL connection shared by the backend, the optimizer and the jobs.
  DB_POST_HOST: postgres
  DB_POST_PORT: "5432"
  DB_POST_NAME: postgres
  DB_POST_USER: postgres
  DB_POST_PASSWORD: "CHANGE-ME-strong-random-password"
  # Optional: OpenID Connect provider for POST /user/signin.
  # Leave empty to disable sign-in (endpoint returns 503).
  KEYCLOAK_TOKEN_URL: ""
  CLIENT_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: forecasting-simulation-secrets
  namespace: digital-twin
type: Opaque
stringData:
  # External forecasting API (Chronos). An endpoint and access token are
  # REQUIRED for the forecasting CronJob — contact the maintainers (see
  # MAINTAINERS.md) to obtain them. Data generation works without them.
  FORECASTING_API_ENDPOINT: ""
  FORECASTING_API_KEY: ""
